name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kur
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Java JDK Ayarla
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Bağımlılıkları Kur (Frontend)
      run: |
        cd frontend
        npm install

    - name: Standart ve Geçerli Resim Dosyalarını Oluştur ve app.json Ayarla
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        const path = require('path');

        // Assets klasörünü garantiye al
        if (!fs.existsSync('assets')) {
          fs.mkdirSync('assets');
        }

        // 1x1 piksellik gerçek ve geçerli şeffaf PNG dosyası (Base64)
        const blankPng = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=', 'base64');

        // Tüm zorunlu resimleri diske fiziksel olarak yazıyoruz
        fs.writeFileSync(path.join('assets', 'splash.png'), blankPng);
        fs.writeFileSync(path.join('assets', 'icon.png'), blankPng);
        fs.writeFileSync(path.join('assets', 'adaptive-icon.png'), blankPng);
        fs.writeFileSync(path.join('assets', 'favicon.png'), blankPng);

        // app.json dosyasını bu kesin var olan resimlere yönlendiriyoruz
        if (fs.existsSync('app.json')) {
          let app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          if (app.expo) {
            app.expo.icon = './assets/icon.png';
            app.expo.splash = {
              image: './assets/splash.png',
              resizeMode: 'contain',
              backgroundColor: '#ffffff'
            };
            if (!app.expo.android) app.expo.android = {};
            app.expo.android.adaptiveIcon = {
              foregroundImage: './assets/adaptive-icon.png',
              backgroundColor: '#ffffff'
            };
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('app.json resim yolları başarıyla kalibre edildi.');
          }
        }
        "

    - name: Android Yapısını Oluştur (Expo Prebuild)
      run: |
        cd frontend
        npx expo prebuild --platform android

    - name: APK'yı Çevrimdışı ve Yüklenebilir Hale Getir (Signing Config)
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        const path = 'android/app/build.gradle';
        if (fs.existsSync(path)) {
          let content = fs.readFileSync(path, 'utf8');
          if (content.includes('release {') && !content.includes('signingConfig signingConfigs.debug')) {
            content = content.replace('release {', 'release {\n        signingConfig signingConfigs.debug');
            fs.writeFileSync(path, content);
            console.log('İmza ayarı başarıyla enjekte edildi.');
          }
        }
        "

    - name: Gradle Yetkilerini Düzenle
      run: |
        cd frontend/android
        chmod +x gradlew

    - name: APK Derle (Release Standalone Mod)
      run: |
        cd frontend/android
        ./gradlew assembleRelease

    - name: APK Dosyasını Çıktı Olarak Al
      uses: actions/upload-artifact@v4
      with:
        name: emergent-ai-app
        path: frontend/android/app/build/outputs/apk/release/app-release.apk
        
