name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kur
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Java JDK Ayarla
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Bağımlılıkları Kur (Frontend)
      run: |
        cd frontend
        npm install

    - name: Tüm Asset Tanımlarını Temizle (Jimp Bypass)
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        if (fs.existsSync('app.json')) {
          let app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          if (app.expo) {
            delete app.expo.icon;
            delete app.expo.splash;
            if (app.expo.android) {
              delete app.expo.android.splash;
              delete app.expo.android.adaptiveIcon;
              delete app.expo.android.icon;
            }
            if (app.expo.plugins) {
              app.expo.plugins = app.expo.plugins.filter(p => {
                const name = typeof p === 'string' ? p : (Array.isArray(p) ? p[0] : '');
                return !name.includes('splash') && !name.includes('icon');
              });
            }
          }
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
        }
        "

    - name: Metro Konfigürasyonunu Sıfırla (Metro Crash Bypass)
      run: |
        cd frontend
        echo "const { getDefaultConfig } = require('expo/metro-config');" > metro.config.js
        echo "module.exports = getDefaultConfig(__dirname);" >> metro.config.js

    - name: Android Yapısını Oluştur (Expo Prebuild)
      run: |
        cd frontend
        npx expo prebuild --platform android

    - name: APK'yı Çevrimdışı ve Yüklenebilir Hale Getir (Signing Config)
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        const path = 'android/app/build.gradle';
        if (fs.existsSync(path)) {
          let content = fs.readFileSync(path, 'utf8');
          if (content.includes('release {') && !content.includes('signingConfig signingConfigs.debug')) {
            content = content.replace('release {', 'release {\n        signingConfig signingConfigs.debug');
            fs.writeFileSync(path, content);
          }
        }
        "

    - name: Gradle Yetkilerini Düzenle
      run: |
        cd frontend/android
        chmod +x gradlew

    - name: APK Derle (Release Standalone Mod)
      run: |
        cd frontend/android
        ./gradlew assembleRelease

    - name: APK Dosyasını Çıktı Olarak Al
      uses: actions/upload-artifact@v4
      with:
        name: emergent-ai-app
        path: frontend/android/app/build/outputs/apk/release/app-release.apk
        
