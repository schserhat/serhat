name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kur
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Java JDK Ayarla
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Bağımlılıkları Kur (Frontend)
      run: |
        cd frontend
        npm install

    - name: Eksik veya Hatalı Resim Dosyalarını Güvenceye Al
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        const path = require('path');
        
        if (!fs.existsSync('assets')) {
          fs.mkdirSync('assets');
        }
        
        const blankPng = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=', 'base64');
        
        fs.writeFileSync(path.join('assets', 'splash.png'), blankPng);
        fs.writeFileSync(path.join('assets', 'icon.png'), blankPng);
        fs.writeFileSync(path.join('assets', 'adaptive-icon.png'), blankPng);
        fs.writeFileSync(path.join('assets', 'favicon.png'), blankPng);
        
        if (fs.existsSync('app.json')) {
          let app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          if (app.expo) {
            delete app.expo.splash;
            if (app.expo.android) {
              delete app.expo.android.splash;
              delete app.expo.android.adaptiveIcon;
            }
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Resimler ve ayarlar başarıyla simüle edildi.');
          }
        }
        "

    - name: Android Yapısını Oluştur (Expo Prebuild)
      run: |
        cd frontend
        npx expo prebuild --platform android

    - name: Gradle Yetkilerini Düzenle
      run: |
        cd frontend/android
        chmod +x gradlew

    - name: APK Derle (Debug)
      run: |
        cd frontend/android
        ./gradlew assembleDebug

    - name: APK Dosyasını Çıktı Olarak Al
      uses: actions/upload-artifact@v4
      with:
        name: emergent-ai-app
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        
