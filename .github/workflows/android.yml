name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kur
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Java JDK Ayarla
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Bağımlılıkları Kur (Frontend)
      run: |
        cd frontend
        npm install

    - name: Hatalı Splash Motorunu Sabote Et (Bypass)
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        const p = 'node_modules/@expo/prebuild-config/build/plugins/unversioned/expo-splash-screen/withAndroidSplashImages.js';
        if (fs.existsSync(p)) {
          let content = fs.readFileSync(p, 'utf8');
          content = content.replace('async function setSplashImageDrawablesForThemeAsync(', 'async function setSplashImageDrawablesForThemeAsync(...args) { return args[0]; } async function old_setSplash(');
          fs.writeFileSync(p, content);
          console.log('Splash fonksiyonu başarıyla etkisiz hale getirildi.');
        }
        "

    - name: Android Yapısını Oluştur (Expo Prebuild)
      run: |
        cd frontend
        npx expo prebuild --platform android

    - name: APK'yı Çevrimdışı ve Yüklenebilir Hale Getir (Signing Config)
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        const path = 'android/app/build.gradle';
        if (fs.existsSync(path)) {
          let content = fs.readFileSync(path, 'utf8');
          if (content.includes('release {') && !content.includes('signingConfig signingConfigs.debug')) {
            content = content.replace('release {', 'release {\n        signingConfig signingConfigs.debug');
            fs.writeFileSync(path, content);
            console.log('İmza ayarı başarıyla enjekte edildi.');
          }
        }
        "

    - name: Gradle Yetkilerini Düzenle
      run: |
        cd frontend/android
        chmod +x gradlew

    - name: APK Derle (Release Standalone Mod)
      run: |
        cd frontend/android
        ./gradlew assembleRelease

    - name: APK Dosyasını Çıktı Olarak Al
      uses: actions/upload-artifact@v4
      with:
        name: emergent-ai-app
        path: frontend/android/app/build/outputs/apk/release/app-release.apk
        
