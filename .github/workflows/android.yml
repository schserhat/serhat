name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kur
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Java JDK Ayarla
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Bağımlılıkları Kur (Frontend)
      run: |
        cd frontend
        npm install

    - name: Standart Logo Üret ve Riskli Ayarları Temizle
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        const path = require('path');

        if (!fs.existsSync('assets')) {
          fs.mkdirSync('assets');
        }

        // Sadece ana uygulama logosu için standart bir görsel bırakıyoruz
        const validPng = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAQAAAAAYJURAAAAPElEQVR42u3OMQEAAAwCoNm/9ErgCRg08OIBgEAAIBgACAQAAgGAQAAgEAAIBgACAQAAgEAAIBgACAQAAgH8wQAn9wGByI2bFAAAAABJRU5ErkJggg==', 'base64');
        fs.writeFileSync(path.join('assets', 'icon.png'), validPng);

        if (fs.existsSync('app.json')) {
          let app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          if (app.expo) {
            // Hata veren splash ekranı ayarlarını kökten siliyoruz
            delete app.expo.splash;
            
            if (app.expo.android) {
              delete app.expo.android.splash;
              delete app.expo.android.adaptiveIcon; // Karmaşık ikon katmanlarını iptal et
            }
            
            // Logoyu garantiye aldığımız dosyaya yönlendiriyoruz
            app.expo.icon = './assets/icon.png';

            // Eklenti listesinden splash eklentisini temizle
            if (app.expo.plugins) {
              app.expo.plugins = app.expo.plugins.filter(p => {
                const name = typeof p === 'string' ? p : (Array.isArray(p) ? p[0] : '');
                return !name.includes('splash');
              });
            }
          }
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          console.log('Ayar dosyası başarıyla sterilize edildi.');
        }
        "

    - name: Android Yapısını Oluştur (Expo Prebuild)
      run: |
        cd frontend
        npx expo prebuild --platform android

    - name: JS Kodlarını APK İçine Mühürle (Expo Official Embed)
      run: |
        cd frontend
        mkdir -p android/app/src/main/assets
        npx expo export:embed --platform android --dev false --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

    - name: Gradle Yetkilerini Düzenle
      run: |
        cd frontend/android
        chmod +x gradlew

    - name: APK Derle (Debug Standalone Mod)
      run: |
        cd frontend/android
        ./gradlew assembleDebug

    - name: APK Dosyasını Çıktı Olarak Al
      uses: actions/upload-artifact@v4
      with:
        name: emergent-ai-app
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        
